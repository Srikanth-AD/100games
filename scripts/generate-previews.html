<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Game Previews</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:190px;flex-shrink:0;background:#0a0a0a;border-right:1px solid #222;overflow-y:auto;padding:10px 8px}
#sidebar h2{font-size:11px;letter-spacing:.12em;color:#555;padding:6px 8px 10px;font-family:sans-serif;font-weight:700;text-transform:uppercase}
.g-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;border-radius:7px;padding:7px 8px;cursor:pointer;color:#aaa;font-size:12px;font-family:sans-serif;text-align:left;transition:background .15s,color .15s}
.g-btn:hover{background:#1a1a1a;color:#fff}
.g-btn.active{background:#1e1e1e;color:#fff}
.g-btn.active .dot{opacity:1}
.dot{width:3px;height:20px;border-radius:3px;flex-shrink:0;opacity:.3;transition:opacity .15s}
.g-num{font-size:10px;color:#444;width:18px;flex-shrink:0}
.g-name{font-family:'Black Ops One',cursive;font-size:11px;letter-spacing:.06em;flex:1}
#main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;background:#111;overflow:auto}
canvas{border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.7);max-width:100%;height:auto}
#dl-btn{padding:10px 32px;font-size:15px;font-family:'Black Ops One',cursive;letter-spacing:.08em;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s}
#dl-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="sidebar">
  <h2>Games</h2>
</div>
<div id="main">
  <canvas id="c" width="600" height="400"></canvas>
  <button id="dl-btn" onclick="download()">Save preview</button>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=600,H=400;

const GAMES=[
  {num:'01',name:'DRIFT',   color:'#00e5ff', draw:drawDrift},
  {num:'02',name:'FLICK',   color:'#448aff', draw:drawFlick},
  {num:'03',name:'SPLAT',   color:'#69f0ae', draw:drawSplat},
  {num:'04',name:'PATINTERO',color:'#ff6d00',draw:drawPatintero},
  {num:'05',name:'BARRAGE', color:'#ff1744', draw:drawBarrage},
  {num:'06',name:'SWARM',   color:'#76ff03', draw:drawSwarm},
  {num:'07',name:'SORT IT', color:'#e040fb', draw:drawSortIt},
  {num:'08',name:'SLAP DECK',color:'#7c4dff',draw:drawSlapDeck},
  {num:'09',name:'CAST',    color:'#ffd740', draw:drawCast},
  {num:'10',name:'CHOPPER', color:'#ff6e40', draw:drawChopper},
  {num:'11',name:'BASH',    color:'#c1440e', draw:drawBash},
  {num:'12',name:'HUSTLE',  color:'#00c853', draw:drawHustle},
  {num:'13',name:'HARVEST', color:'#ffc107', draw:drawHarvest},
  {num:'14',name:'DIG',     color:'#f4a261', draw:drawDig},
  {num:'15',name:'PYRAMID', color:'#ff8f00', draw:drawPyramid},
  {num:'16',name:'LUKSONG TINIK',color:'#ff6b35',draw:drawTinik},
  {num:'17',name:'ARCHER',  color:'#e91e63', draw:drawArcher},
  {num:'18',name:'RING TOSS',color:'#ffd700',draw:drawRingToss},
  {num:'19',name:'DECODE',  color:'#69f0ae', draw:drawDecode},
  {num:'20',name:'BOOMERANG',color:'#d4a030',draw:drawBoomerang},
  {num:'21',name:'MINE',    color:'#ffd740', draw:drawMine},
  {num:'22',name:'MAZE',    color:'#7c4dff', draw:drawMaze},
  {num:'23',name:'FENCE',   color:'#ff5252', draw:drawFence},
  {num:'24',name:'REGATTA', color:'#4fc3f7', draw:drawRegatta},
  {num:'25',name:'DUNES',   color:'#d4a030', draw:drawDunes},
  {num:'26',name:'SEE-SAW', color:'#FFD700', draw:drawSeeSaw},
  {num:'27',name:'PADDLE RACE', color:'#87CEEB', draw:drawPaddleRace},
  {num:'28',name:'WELL CLIMB', color:'#8B4513', draw:drawWellClimb},
];

let currentIdx=10;
let currentFilename='bash-preview.png';

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  GAMES.forEach((g,i)=>{
    const btn=document.createElement('button');
    btn.className='g-btn'+(i===currentIdx?' active':'');
    btn.innerHTML=`<div class="dot" style="background:${g.color}"></div><span class="g-num">${g.num}</span><span class="g-name">${g.name}</span>`;
    btn.onclick=()=>selectGame(i);
    sb.appendChild(btn);
  });
}

function selectGame(i){
  document.querySelectorAll('.g-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  currentIdx=i;
  const g=GAMES[i];
  currentFilename=g.name.toLowerCase().replace(' ','')+'-preview.png';
  document.getElementById('dl-btn').style.background=g.color;
  document.getElementById('dl-btn').style.color=isLight(g.color)?'#000':'#fff';
  document.getElementById('dl-btn').textContent='Save '+currentFilename;
  ctx.clearRect(0,0,W,H);
  g.draw();
}

function isLight(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>128;
}

function download(){
  const a=document.createElement('a');
  a.download=currentFilename;
  a.href=cv.toDataURL('image/png');
  a.click();
}

/* ───── HELPERS ───── */
function title(text,color,x,y,size){
  ctx.save();ctx.textAlign='center';
  ctx.font=`bold ${size||60}px "Black Ops One",serif`;
  ctx.shadowColor=color;ctx.shadowBlur=22;
  ctx.fillStyle='#fff';ctx.fillText(text,x||W/2,y||70);
  ctx.shadowBlur=0;ctx.restore();
}
function hud(score,label,color){
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,0,W,52);
  ctx.textAlign='left';ctx.font='bold 10px "Black Ops One",serif';
  ctx.fillStyle='rgba(255,255,255,0.38)';ctx.fillText(label||'SCORE',14,18);
  ctx.font='bold 22px "Black Ops One",serif';ctx.fillStyle=color||'#fff';ctx.fillText(score||'0',14,42);
  ctx.restore();
}
function hearts(n,total){
  ctx.save();ctx.font='18px sans-serif';ctx.textAlign='center';
  for(let i=0;i<total;i++){ctx.globalAlpha=i<n?1:0.2;ctx.fillText('❤️',W-80+(i-1)*26,42);}
  ctx.globalAlpha=1;ctx.restore();
}

/* ═══════════════════ DRAW FUNCTIONS ═══════════════════ */

function drawDrift(){
  // Deep ocean neon
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#001033');bg.addColorStop(1,'#000a1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // bubbles
  ctx.fillStyle='rgba(0,229,255,0.12)';
  for(let i=0;i<18;i++){ctx.beginPath();ctx.arc(60+i*30,50+i*18,4+i%5,0,Math.PI*2);ctx.fill();}
  // coral
  ctx.strokeStyle='#ff5252';ctx.lineWidth=3;
  for(let i=0;i<5;i++){
    const cx=50+i*110,cy=H-20;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-40-i*10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-20);ctx.lineTo(cx-16,cy-36);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-20);ctx.lineTo(cx+16,cy-36);ctx.stroke();
  }
  // fish/diver
  ctx.fillStyle='#00e5ff';ctx.beginPath();ctx.ellipse(W/2,H/2,30,18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(W/2+20,H/2-5,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(W/2+22,H/2-5,3,0,Math.PI*2);ctx.fill();
  title('DRIFT','#00e5ff',W/2,H*0.28,56);
  hud('1200','SCORE','#00e5ff');hearts(3,3);
}

function drawFlick(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d1b2a');bg.addColorStop(1,'#0a0f1e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // targets
  const cols=['#448aff','#ff5252','#ffd740'];
  [[W*0.25,H*0.45],[W*0.55,H*0.35],[W*0.75,H*0.55]].forEach(([tx,ty],i)=>{
    [30,20,10].forEach(r=>{ctx.strokeStyle=r===10?cols[i]:'rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);ctx.stroke();});
  });
  // projectile arc
  ctx.strokeStyle='rgba(68,138,255,0.5)';ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(W*0.15,H*0.8);ctx.quadraticCurveTo(W*0.3,H*0.2,W*0.55,H*0.35);ctx.stroke();
  ctx.setLineDash([]);
  // ball
  ctx.fillStyle='#fff';ctx.shadowColor='#448aff';ctx.shadowBlur=14;
  ctx.beginPath();ctx.arc(W*0.15,H*0.8,10,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  title('FLICK','#448aff',W/2,H*0.25,56);
  hud('850','SCORE','#448aff');hearts(2,3);
}

function drawSplat(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a2a18');bg.addColorStop(1,'#0d1a0d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // path lines
  ctx.strokeStyle='rgba(105,240,174,0.2)';ctx.lineWidth=2;
  for(let y=100;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // balloons
  const bColors=['#ff5252','#448aff','#ffd740','#e040fb'];
  [[W*0.2,H*0.4],[W*0.5,H*0.28],[W*0.75,H*0.52]].forEach(([bx,by],i)=>{
    ctx.fillStyle=bColors[i];ctx.beginPath();ctx.ellipse(bx,by,18,22,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bx,by+22);ctx.lineTo(bx,by+34);ctx.stroke();
  });
  // duck
  ctx.fillStyle='#ffd740';ctx.beginPath();ctx.ellipse(W*0.62,H*0.72,22,14,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(W*0.62+18,H*0.72-8,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff6d00';ctx.beginPath();ctx.moveTo(W*0.62+26,H*0.72-8);ctx.lineTo(W*0.62+34,H*0.72-6);ctx.lineTo(W*0.62+26,H*0.72-4);ctx.fill();
  title('SPLAT','#69f0ae',W/2,H*0.88,44);
  hud('640','SCORE','#69f0ae');hearts(3,3);
}

function drawPatintero(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0e00');bg.addColorStop(1,'#0d0700');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // court lines
  ctx.strokeStyle='rgba(255,109,0,0.5)';ctx.lineWidth=2;
  const cy=H*0.7,ch=H*0.25,cw=W*0.7,cx=(W-cw)/2;
  ctx.strokeRect(cx,cy-ch,cw,ch);
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(cx,cy-ch+i*(ch/4));ctx.lineTo(cx+cw,cy-ch+i*(ch/4));ctx.stroke();}
  ctx.beginPath();ctx.moveTo(cx+cw/2,cy-ch);ctx.lineTo(cx+cw/2,cy);ctx.stroke();
  // player
  ctx.fillStyle='#ff6d00';ctx.beginPath();ctx.arc(W/2,H*0.5,14,0,Math.PI*2);ctx.fill();
  // guards
  ctx.fillStyle='#ff1744';
  [[cx+cw*0.15,cy-ch*0.5],[cx+cw*0.85,cy-ch*0.5],[cx+cw*0.5,cy-ch*0.25]].forEach(([gx,gy])=>{
    ctx.beginPath();ctx.arc(gx,gy,10,0,Math.PI*2);ctx.fill();
  });
  title('PATINTERO','#ff6d00',W/2,H*0.18,44);
  hud('3','LINES','#ff6d00');hearts(2,3);
}

function drawBarrage(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0000');bg.addColorStop(1,'#0d0000');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // projectiles
  const pColor='#ff1744';
  for(let i=0;i<12;i++){
    const px=50+i*48,py=80+i*22;
    ctx.fillStyle=pColor;ctx.shadowColor=pColor;ctx.shadowBlur=8;
    ctx.beginPath();ctx.ellipse(px,py,10,5,-0.5,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;
  // player
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(W/2,H*0.82,16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff1744';ctx.beginPath();ctx.arc(W/2,H*0.82,8,0,Math.PI*2);ctx.fill();
  title('BARRAGE','#ff1744',W/2,H*0.35,56);
  hud('3200','SCORE','#ff1744');hearts(1,3);
}

function drawSwarm(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#091a00');bg.addColorStop(1,'#040d00');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // enemies
  ctx.fillStyle='#76ff03';ctx.shadowColor='#76ff03';ctx.shadowBlur=6;
  for(let i=0;i<20;i++){
    const ex=30+i*28+(Math.sin(i*0.9))*20,ey=60+i*12;
    ctx.beginPath();ctx.arc(ex,ey,6,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;
  // player turret
  ctx.fillStyle='#fff';ctx.fillRect(W/2-14,H-50,28,30);
  ctx.fillStyle='#76ff03';ctx.fillRect(W/2-3,H-70,6,24);
  title('SWARM','#76ff03',W/2,H*0.7,56);
  hud('5','WAVE','#76ff03');hearts(2,3);
}

function drawSortIt(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0028');bg.addColorStop(1,'#0d0015');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // planets
  const planets=[
    {x:W*0.18,y:H*0.55,r:28,c:'#e040fb'},{x:W*0.36,y:H*0.48,r:20,c:'#7c4dff'},
    {x:W*0.54,y:H*0.52,r:36,c:'#448aff'},{x:W*0.72,y:H*0.46,r:16,c:'#ffd740'},
    {x:W*0.86,y:H*0.56,r:22,c:'#ff5252'},
  ];
  planets.forEach(p=>{
    ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.ellipse(p.x-p.r*0.3,p.y-p.r*0.3,p.r*0.35,p.r*0.2,-0.5,0,Math.PI*2);ctx.fill();
  });
  // rings around one
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(W*0.54,H*0.52,55,14,0,0,Math.PI*2);ctx.stroke();
  title('SORT IT','#e040fb',W/2,H*0.25,52);
  hud('4','LEVEL','#e040fb');hearts(3,3);
}

function drawSlapDeck(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#110020');bg.addColorStop(1,'#080010');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // cards
  const suits=['♠','♥','♦','♣'];
  [[W*0.3,H*0.48,0.1],[W*0.5,H*0.46,-0.05],[W*0.7,H*0.5,0.08]].forEach(([cx,cy,rot],i)=>{
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(-28,-40,56,80,6);ctx.fill();
    ctx.fillStyle=i%2===0?'#7c4dff':'#ff5252';
    ctx.font='bold 28px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(suits[i],0,0);ctx.restore();
  });
  // hand
  ctx.fillStyle='rgba(255,215,0,0.8)';ctx.font='bold 22px "Black Ops One",serif';
  ctx.textAlign='center';ctx.fillText('SLAP!',W/2,H*0.82);
  title('SLAP DECK','#7c4dff',W/2,H*0.2,48);
  hud('140','SCORE','#7c4dff');hearts(2,3);
}

function drawCast(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#001a33');bg.addColorStop(0.6,'#002244');bg.addColorStop(1,'#003366');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // water ripples
  ctx.strokeStyle='rgba(255,215,64,0.15)';ctx.lineWidth=1;
  for(let i=1;i<5;i++){ctx.beginPath();ctx.ellipse(W/2,H*0.7,i*60,i*16,0,0,Math.PI*2);ctx.stroke();}
  // fishing line
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(W*0.25,H*0.15);ctx.quadraticCurveTo(W*0.55,H*0.4,W/2,H*0.7);ctx.stroke();
  ctx.setLineDash([]);
  // fish
  ctx.fillStyle='#ffd740';ctx.shadowColor='#ffd740';ctx.shadowBlur=10;
  ctx.beginPath();ctx.ellipse(W/2,H*0.72,22,12,0.3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // rod
  ctx.strokeStyle='#a0522d';ctx.lineWidth=4;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(W*0.2,H*0.12);ctx.lineTo(W*0.28,H*0.18);ctx.stroke();
  title('CAST','#ffd740',W/2,H*0.42,60);
  hud('8','CAUGHT','#ffd740');hearts(3,3);
}

function drawChopper(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a1020');bg.addColorStop(1,'#050810');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // obstacles
  ctx.fillStyle='rgba(255,110,64,0.7)';
  [[0,H*0.1,W*0.12,H*0.22],[W*0.35,0,W*0.12,H*0.28],[W*0.6,H*0.18,W*0.12,H*0.25],[W*0.82,0,W*0.12,H*0.3]].forEach(([ox,oy,ow,oh])=>{
    ctx.beginPath();ctx.roundRect(ox,oy,ow,oh,4);ctx.fill();
  });
  // helicopter body
  ctx.fillStyle='#ff6e40';ctx.shadowColor='#ff6e40';ctx.shadowBlur=12;
  ctx.beginPath();ctx.ellipse(W*0.28,H*0.55,30,16,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W*0.28-18,H*0.55-18);ctx.lineTo(W*0.28+18,H*0.55-18);ctx.stroke();
  title('CHOPPER','#ff6e40',W/2,H*0.82,52);
  hud('420','SCORE','#ff6e40');hearts(2,3);
}

function drawBash(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0800');bg.addColorStop(1,'#0d0300');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // dots
  ctx.fillStyle='rgba(255,100,0,0.04)';
  for(let x=0;x<W;x+=20)for(let y=0;y<H;y+=20)ctx.fillRect(x,y,1,1);
  // title
  ctx.textAlign='left';ctx.font='bold 64px "Black Ops One",serif';
  ctx.shadowColor='#ff4400';ctx.shadowBlur=24;ctx.fillStyle='#fff';ctx.fillText('BASH',44,66);ctx.shadowBlur=0;
  ctx.font='13px "Black Ops One",serif';ctx.fillStyle='rgba(255,180,100,0.65)';ctx.fillText("something's hiding...",46,86);
  // bricks
  const states=[['idle','idle','shaking','idle'],['idle','broken','idle','idle'],['idle','idle','idle','shaking']];
  const creatures=[{color:'#6dff4f'},{color:'#ff5252'},{color:'#ffd740'},{color:'#82cfff'},{color:'#cf6fff'}];
  const COLS=4,ROWS=3,GAP=8,bW=90,bH=50;
  const gridX=(W-(COLS*bW+GAP*(COLS-1)))/2,gridY=90;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=gridX+c*(bW+GAP),y=gridY+r*(bH+GAP),st=states[r][c],cr=creatures[(r*COLS+c)%creatures.length];
      ctx.save();ctx.translate(x+bW/2,y+bH/2);
      const wobX=st==='shaking'?Math.sin((r*3+c*7)*1.3)*4:0;
      ctx.translate(wobX,0);
      ctx.fillStyle=st==='shaking'?'#e83300':'#c1440e';
      ctx.beginPath();ctx.roundRect(-bW/2,-bH/2,bW,bH,5);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.16)';
      ctx.beginPath();ctx.roundRect(-bW/2,-bH/2,bW,bH*0.32,[5,5,0,0]);ctx.fill();
      if(st==='shaking'){
        ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(bW*0.05,-bH*0.28);ctx.lineTo(bW*0.18,bH*0.1);ctx.lineTo(-bW*0.06,bH*0.32);
        ctx.moveTo(0,0);ctx.lineTo(-bW*0.28,-bH*0.22);ctx.stroke();

function drawHarvestPlot(x,y,w,h,state){
  ctx.fillStyle='#5d4037';ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.fill();
  ctx.fillStyle='#6d4c41';ctx.beginPath();ctx.roundRect(x+2,y+2,w-4,h*0.35,4);ctx.fill();

  if(state==='growing'){
    ctx.strokeStyle='#81c784';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx2,cy2+sz*0.5);ctx.lineTo(cx2,cy2-sz*0.3);ctx.stroke();
    ctx.fillStyle='#a5d6a7';ctx.beginPath();ctx.ellipse(cx2+sz*0.3,cy2-sz*0.2,sz*0.28,sz*0.16,0.5,0,Math.PI*2);ctx.fill();
  } else {

    ctx.beginPath();ctx.moveTo(cx2,cy2+sz*0.6);ctx.lineTo(cx2,cy2-sz*0.8);ctx.stroke();
    ctx.fillStyle=wilt?'#c8e6c9':'#66bb6a';
    ctx.beginPath();ctx.ellipse(cx2+sz*0.5,cy2-sz*0.1,sz*0.5,sz*0.2,0.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx2-sz*0.5,cy2-sz*0.4,sz*0.5,sz*0.2,-0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=wilt?'#ffe082':'#ffc107';
    ctx.beginPath();ctx.ellipse(cx2,cy2-sz*1.0,sz*0.22,sz*0.45,0,0,Math.PI*2);ctx.fill();

}

function drawStar(ctx,cx,cy,r1,r2,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const angle=i*Math.PI/pts-Math.PI/2;
    const r=i%2===0?r1:r2;
    i===0?ctx.moveTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle)):ctx.lineTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle));
  }
  ctx.closePath();ctx.fill();
}

  // Player pyramid (7 stones built)
  const pCX=W*0.26,aCX=W*0.74;

      }

}

function drawDecode(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // Matrix rain
  const cw=12,ch=16;const cols=Math.floor(W/cw);
  const KATA='ｦｧｨｩｪｫｬｭｮｯｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  ctx.font=`bold ${ch*0.9}px monospace`;
  for(let c=0;c<cols;c++){
    const rows=12+Math.floor((c*7)%10);
    const startY=((c*43)%H);
    for(let r=0;r<rows;r++){
      const y=startY+r*ch;if(y>H+ch)continue;
      const frac=r/rows;const bright=r===rows-1;
      ctx.fillStyle=bright?'#c8ffcc':`rgba(0,${Math.round(140+frac*115)},40,${0.08+frac*0.35})`;
      ctx.textAlign='left';ctx.fillText(KATA[(c*13+r*7)%KATA.length],c*cw,y);

  ctx.fillStyle='rgba(0,40,0,0.6)';ctx.beginPath();ctx.roundRect(wordX-8,wordY-ch*1.1,word.length*cw+16,ch*1.5,4);ctx.fill();

  ctx.font=`bold ${ch*0.95}px monospace`;ctx.textAlign='left';
  for(let i=0;i<word.length;i++){

  // Another word

  for(let i=0;i<w2.length;i++){ctx.fillStyle='#ff5252';ctx.shadowColor='#ff0000';ctx.shadowBlur=6;ctx.fillText(w2[i],w2X+i*cw,w2Y);}ctx.shadowBlur=0;
  // Title
  ctx.textAlign='center';ctx.font='bold 58px "Black Ops One",serif';
  ctx.shadowColor='#00ff44';ctx.shadowBlur=22;ctx.fillStyle='#fff';ctx.fillText('DECODE',W/2,H*0.2);ctx.shadowBlur=0;
  ctx.font='12px "Black Ops One",serif';ctx.fillStyle='rgba(0,255,60,0.7)';ctx.fillText('spot the word · tap fast · combo up',W/2,H*0.28);
  hud('1240','SCORE','#69f0ae');hearts(2,3);
}

function drawMine(){
  ctx.fillStyle='#0a0505';ctx.fillRect(0,0,W,H);
  // Grid of cave cells
  const COLS=6,ROWS=5,cw=W*0.82/COLS,ch=H*0.62/ROWS,ox=(W-COLS*cw)/2,oy=H*0.18;
  const minerals=[
    [null,'coal','iron','coal',null,'gold'],
    ['coal','ruby','coal','iron','coal','coal'],
    ['iron',null,'diamond','coal','ruby','iron'],
    ['coal','coal','iron',null,'coal','iron'],
    ['mined','mined','player','mined','bat','coal'],
  ];
  const mCols={coal:'#546e7a',iron:'#b0bec5',gold:'#ffd740',ruby:'#f44336',diamond:'#80d8ff',mined:'#1a1010',bat:'#2a0030',player:'#ffd740'};
  minerals.forEach((row,r)=>row.forEach((m,c)=>{
    const x=ox+c*cw,y=oy+r*ch;
    if(m==='mined'){ctx.fillStyle='#1a1010';ctx.beginPath();ctx.roundRect(x+1,y+1,cw-2,ch-2,2);ctx.fill();return;}
    // Wall
    const wg=ctx.createLinearGradient(x,y,x,y+ch);wg.addColorStop(0,'#3d2a1a');wg.addColorStop(1,'#2a1a0a');
    ctx.fillStyle=wg;ctx.beginPath();ctx.roundRect(x+1,y+1,cw-2,ch-2,2);ctx.fill();
    if(m&&m!=='player'&&m!=='bat'){
      const mc=mCols[m];ctx.fillStyle=mc;ctx.shadowColor=mc;ctx.shadowBlur=m==='diamond'||m==='ruby'?8:3;
      ctx.globalAlpha=m==='diamond'?0.8:0.55;ctx.beginPath();ctx.ellipse(x+cw/2,y+ch/2,cw*0.22,ch*0.18,0.3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
    if(m==='player'){
      ctx.fillStyle='#ffd740';ctx.shadowColor='#ffd740';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(x+cw/2,y+ch/2,cw*0.3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#c8956a';ctx.beginPath();ctx.arc(x+cw/2,y+ch/2-2,cw*0.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffd740';ctx.beginPath();ctx.arc(x+cw/2,y+ch/2-cw*0.26,cw*0.23,Math.PI,0);ctx.fill();
    }
    if(m==='bat'){
      ctx.fillStyle='#330033';ctx.beginPath();ctx.ellipse(x+cw/2,y+ch/2,cw*0.25,ch*0.16,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#660066';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x+cw*0.35,y+ch*0.38);ctx.quadraticCurveTo(x+cw*0.1,y+ch*0.15,x+cw*0.02,y+ch*0.42);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+cw*0.65,y+ch*0.38);ctx.quadraticCurveTo(x+cw*0.9,y+ch*0.15,x+cw*0.98,y+ch*0.42);ctx.stroke();
    }
  }));
  // Safe zone glow
  ctx.fillStyle='rgba(255,215,0,0.1)';ctx.beginPath();ctx.arc(ox+1*cw+cw/2,oy+3*ch+ch/2,cw*1.1,0,Math.PI*2);ctx.fill();
  ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('⚡',ox+1*cw+cw/2,oy+3*ch+ch*0.65);
  // Title
  ctx.textAlign='center';ctx.font='bold 66px "Black Ops One",serif';
  ctx.shadowColor='#ffd740';ctx.shadowBlur=20;ctx.fillStyle='#fff';ctx.fillText('MINE',W/2,H*0.15);ctx.shadowBlur=0;
  ctx.font='11px "Black Ops One",serif';ctx.fillStyle='rgba(255,215,64,0.7)';ctx.fillText('dig minerals · avoid bats · hide in safe zones',W/2,H*0.22);
  hud('1250','SCORE','#ffd740');hearts(2,3);
}

function drawMaze(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0512');bg.addColorStop(1,'#050a0f');

  const COLS=9,ROWS=11,cw=W*0.78/COLS,ch=H*0.68/ROWS,ox=(W-COLS*cw)/2,oy=H*0.14;
  // Draw some walls to look like a maze
  ctx.strokeStyle='#3a2060';ctx.lineWidth=2.5;
  // Outer border
  ctx.strokeRect(ox,oy,COLS*cw,ROWS*ch);
  // Interior walls (hand-placed to look maze-like)
  const walls=[
    // horizontal segments [col,row,len]
    [0,1,3],[4,1,2],[7,1,2],[1,2,2],[5,2,3],[0,3,2],[3,3,2],[6,3,2],[1,4,3],[5,4,2],[0,5,1],[2,5,3],[6,5,2],[1,6,2],[4,6,3],[0,7,3],[5,7,2],[2,8,2],[6,8,2],[1,9,3],[5,9,3],
  ];
  walls.forEach(([c,r,l])=>{ctx.beginPath();ctx.moveTo(ox+c*cw,oy+r*ch);ctx.lineTo(ox+(c+l)*cw,oy+r*ch);ctx.stroke();});
  const vwalls=[[3,0,2],[6,0,1],[1,1,2],[5,1,2],[8,1,3],[2,2,1],[4,2,2],[7,2,2],[0,3,2],[3,3,2],[5,3,1],[1,4,2],[4,4,1],[6,4,2],[2,5,2],[5,5,2],[3,6,2],[7,6,2],[1,7,1],[4,7,2],[6,8,2]];
  vwalls.forEach(([c,r,l])=>{ctx.beginPath();ctx.moveTo(ox+c*cw,oy+r*ch);ctx.lineTo(ox+c*cw,oy+(r+l)*ch);ctx.stroke();});
  // Safe zone
  ctx.fillStyle='rgba(255,215,0,0.1)';ctx.fillRect(ox+4*cw,oy+5*ch,cw*2,ch*2);
  ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('⚡',ox+5*cw,oy+6*ch+6);

  ctx.fillStyle='rgba(105,240,174,0.15)';ctx.fillRect(ox+7*cw,oy+9*ch,cw*2,ch*2);

  // Player (blue dot)
  ctx.fillStyle='#fff';ctx.shadowColor='#448aff';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(ox+1*cw+cw/2,oy+1*ch+ch/2,cw*0.32,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#448aff';ctx.beginPath();ctx.arc(ox+1*cw+cw/2,oy+1*ch+ch/2,cw*0.2,0,Math.PI*2);ctx.fill();

  }
  // Well interior shading
  const innerShade=ctx.createLinearGradient(0,0,W,0);
  innerShade.addColorStop(0,'rgba(0,0,0,0.5)');innerShade.addColorStop(0.5,'rgba(0,0,0,0)');innerShade.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=innerShade;ctx.fillRect(0,0,W,H);
  // Light from top
  const topLight=ctx.createLinearGradient(0,0,0,H*0.3);
  topLight.addColorStop(0,'rgba(200,200,100,0.3)');topLight.addColorStop(1,'transparent');
  ctx.fillStyle=topLight;ctx.fillRect(0,0,W,H*0.3);
  // Water at bottom
  ctx.fillStyle='rgba(0,100,200,0.3)';ctx.fillRect(0,H*0.8,W,H*0.2);
  // Hazards - spikes at bottom
  ctx.fillStyle='#FF6B6B';
  for(let x=0;x<W;x+=20){
    ctx.beginPath();ctx.moveTo(x,H);ctx.lineTo(x+10,H-15);ctx.lineTo(x+20,H);ctx.closePath();ctx.fill();
  }
  // Player climbing
  ctx.fillStyle='#FF6B6B';ctx.shadowColor='#FF6B6B';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(W/2,H*0.4,20,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('🧗',W/2,H*0.4+8);
  // Hazards - rocks and spiders
  ctx.fillStyle='#8B4513';ctx.beginPath();ctx.arc(W*0.3,H*0.55,12,0,Math.PI*2);ctx.fill();
  ctx.fillText('🪨',W*0.3-8,H*0.55+8);
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(W*0.75,H*0.6,14,0,Math.PI*2);ctx.fill();
  ctx.fillText('🕷️',W*0.75-10,H*0.6+8);
  // Collectible - health potion
  ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(W*0.5,H*0.2,12,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.font='16px sans-serif';ctx.fillText('⚡',W*0.5-6,H*0.2+5);
  // Depth meter background
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.roundRect(W*0.05,H*0.85,W*0.9,12,3);ctx.fill();
  // Depth meter fill
  ctx.fillStyle='#2ecc71';ctx.beginPath();ctx.roundRect(W*0.05,H*0.85,W*0.9*0.4,12,3);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='9px "Black Ops One"';ctx.textAlign='left';ctx.fillText('400m / 1000m',W*0.08,H*0.93);
  title('WELL CLIMB','#8B4513',W/2,H*0.08,48);
  hud('585','HEALTH','#8B4513');hearts(2,3);
}

document.fonts.ready.then(()=>{
  buildSidebar();
  selectGame(currentIdx);
});
</script>
