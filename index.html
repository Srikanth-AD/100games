<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07080f;
  --card-bg: #0d0f1a;
  --card-border: rgba(255,255,255,0.06);
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Stars background */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.stars span {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--op, 0.5); }
}

/* Header */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 3.5rem 1rem 2rem;
}
header h1 {
  font-family: 'Black Ops One', cursive;
  font-size: clamp(2.8rem, 8vw, 5.5rem);
  letter-spacing: 0.12em;
  line-height: 1;
  background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.45));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p {
  margin-top: 0.6rem;
  font-size: 1rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  font-weight: 400;
}

/* Grid */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 2rem 1.6rem;
  padding: 1.5rem 2.5rem 5rem;
  max-width: 1300px;
  margin: 0 auto;
}

/* Card */
.card {
  display: block;
  text-decoration: none;
  color: inherit;
  border-radius: 18px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  overflow: hidden;
  position: relative;
  animation: float var(--dur, 4s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), box-shadow 0.35s ease, border-color 0.3s ease;
  will-change: transform;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-16px) scale(1.03) !important;
  animation-play-state: paused;
  border-color: var(--color);
  box-shadow: 0 0 0 1px var(--color), 0 20px 60px -10px var(--glow);
}
.card:hover .play-btn {
  opacity: 1;
  transform: translateY(0);
}
.card:hover .preview-overlay {
  opacity: 0;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(var(--rot-a, -0.4deg)); }
  50%       { transform: translateY(var(--lift, -10px)) rotate(var(--rot-b, 0.4deg)); }
}

/* Preview window */
.preview {
  width: 100%;
  aspect-ratio: 9/15;
  overflow: hidden;
  position: relative;
  background: #000;
}
.iframe-wrap {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.iframe-wrap iframe {
  width: 375px;
  height: 667px;
  border: none;
  transform-origin: top left;
  transform: scale(var(--s));
  pointer-events: none;
  display: block;
}
/* Dim overlay that fades on hover */
.preview-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, var(--card-bg) 100%);
  transition: opacity 0.35s ease;
  pointer-events: none;
}

/* Play button */
.play-btn {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.25s ease, transform 0.3s ease;
  pointer-events: none;
}
.play-btn span {
  font-family: 'Black Ops One', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  background: var(--color);
  color: #000;
  padding: 0.45em 1.2em;
  border-radius: 50px;
  box-shadow: 0 4px 24px var(--glow);
}

/* Card footer */
.info {
  padding: 0.9rem 1rem 1rem;
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
}
.num {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--color);
  opacity: 0.8;
  line-height: 1;
  padding-top: 0.1em;
}
.name {
  font-family: 'Black Ops One', cursive;
  font-size: 1.15rem;
  letter-spacing: 0.06em;
  line-height: 1;
  color: #fff;
}

/* Responsive */
@media (max-width: 600px) {
  .grid { padding: 1rem 1rem 4rem; gap: 1.2rem 0.8rem; }
  header { padding: 2rem 1rem 1.5rem; }
}

// Hex color to rgba for glow
function hexGlow(hex, a = 0.45) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

const grid = document.getElementById('grid');

  const dur = (3.8 + (i % 5) * 0.35).toFixed(2);
  const delay = (i * 0.28).toFixed(2);
  const lift = -(8 + (i % 4) * 3);
  const rotA = (-0.6 + (i % 3) * 0.3).toFixed(1);
  const rotB = (0.6 - (i % 3) * 0.3).toFixed(1);
  const glow = hexGlow(g.color);

  const card = document.createElement('a');
  card.className = 'card';
  card.href = `play.html?g=${g.folder}/${g.file}`;
  card.addEventListener('click', () => {
    gtag('event', 'select_game', { game_number: g.num, game_name: g.name });
  });
  card.style.cssText = `
    --color: ${g.color};
    --glow: ${glow};
    --dur: ${dur}s;
    --delay: ${delay}s;
    --lift: ${lift}px;
    --rot-a: ${rotA}deg;
    --rot-b: ${rotB}deg;
  `;

  card.innerHTML = `
    <div class="preview">
      <div class="iframe-wrap" data-src="${g.folder}/${g.file}">
        <iframe></iframe>
      </div>
      <div class="preview-overlay"></div>
      <div class="play-btn"><span>PLAY</span></div>
    </div>
    <div class="info">
      <span class="num">${g.num}</span>
      <span class="name">${g.name}</span>
    </div>
  `;

  grid.appendChild(card);
});

// Scale iframes to fit their container width
function scaleIframes() {
  document.querySelectorAll('.iframe-wrap').forEach(wrap => {
    const w = wrap.offsetWidth;
    const scale = w / 375;
    const iframe = wrap.querySelector('iframe');
    iframe.style.setProperty('--s', scale);
    iframe.style.transform = `scale(${scale})`;
    // Set container height to match scaled iframe
    wrap.parentElement.style.height = (667 * scale) + 'px';
  });
}

// Load iframes — stagger to avoid hammering simultaneously
function loadIframes() {
  const wraps = document.querySelectorAll('.iframe-wrap[data-src]');
  wraps.forEach((wrap, i) => {
    setTimeout(() => {
      const src = wrap.getAttribute('data-src');
      wrap.querySelector('iframe').src = src;
    }, i * 300);
  });
}

scaleIframes();
window.addEventListener('resize', scaleIframes);
// Small delay so layout is stable before loading
setTimeout(loadIframes, 200);

    top:${Math.random()*100}%;
    --d:${(2 + Math.random()*4).toFixed(1)}s;
    --delay:${(Math.random()*5).toFixed(1)}s;
    --op:${(0.2 + Math.random()*0.6).toFixed(2)};
  `;
  starsEl.appendChild(s);
}
</script>
</body>
