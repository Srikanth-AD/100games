<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { --carousel-h: 88px; }

body {
  background: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Game iframe */
#game-frame {
  display: block;
  width: 100%;
  flex: 1;
  min-height: 0;
  border: none;
}

/* ── CAROUSEL ─────────────────────────────────────── */
#carousel {
  flex-shrink: 0;
  height: var(--carousel-h);
  background: rgba(6,7,14,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* fade edges */
#carousel::before,
#carousel::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 32px;
  z-index: 2;
  pointer-events: none;
}
#carousel::before { left: 0;  background: linear-gradient(to right, rgba(6,7,14,0.9), transparent); }
#carousel::after  { right: 0; background: linear-gradient(to left,  rgba(6,7,14,0.9), transparent); }

#carousel-track {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 28px;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  scrollbar-width: none;
  -ms-overflow-style: none;
  height: 100%;
  width: 100%;
  -webkit-overflow-scrolling: touch;
}
#carousel-track::-webkit-scrollbar { display: none; }

.c-item {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 8px 6px;
  border-radius: 12px;
  border: 1.5px solid transparent;
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.c-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.c-item.active {
  border-color: var(--color);
  background: rgba(255,255,255,0.06);
}
.c-item.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: var(--color);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--color);
}

.c-thumb {
  width: 46px;
  height: 46px;
  border-radius: 9px;
  overflow: hidden;
  background: #111;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Black Ops One', cursive;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,0.9);
  border: 1px solid rgba(255,255,255,0.08);
}

.c-name {
  font-family: 'Black Ops One', cursive;
  font-size: 0.55rem;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.6);
  text-align: center;
  white-space: nowrap;
  line-height: 1;
  transition: color 0.2s;
}
.c-item.active .c-name { color: var(--color); }

/* ── HOME BUTTON ──────────────────────────────────── */
#home-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 1000;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 22px;
  transition: background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
  color: #fff;
}
#home-btn:hover { background: rgba(0,0,0,0.8); transform: scale(1.05); }

/* ── HAMBURGER ────────────────────────────────────── */
#menu-btn {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 1000;
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: background 0.2s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#menu-btn:hover { background: rgba(0,0,0,0.8); transform: scale(1.05); }
#menu-btn span {
  display: block;
  width: 18px;
  height: 2px;
  background: #fff;
  border-radius: 2px;
  transition: transform 0.25s ease, opacity 0.2s;
  transform-origin: center;
}
#menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
#menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
#menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── BACKDROP ─────────────────────────────────────── */
#backdrop {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#backdrop.open { opacity: 1; pointer-events: all; }

/* ── SIDE PANEL ───────────────────────────────────── */
#panel {
  position: fixed;
  top: 0;
  right: 0;
  height: 100%;
  width: min(320px, 88vw);
  z-index: 950;
  background: #0a0b14;
  border-left: 1px solid rgba(255,255,255,0.08);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#panel.open { transform: translateX(0); }

.panel-header {
  padding: 1.2rem 1.2rem 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-header h2 {
  font-family: 'Black Ops One', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.9);
}
.home-link {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: color 0.2s;
}
.home-link:hover { color: rgba(255,255,255,0.75); }

.game-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 0.5rem 0;
}
.game-list::-webkit-scrollbar { width: 3px; }
.game-list::-webkit-scrollbar-track { background: transparent; }
.game-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.game-item {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.7rem 1.2rem;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.game-item:hover { background: rgba(255,255,255,0.04); }
.game-item.active {
  border-left-color: var(--color);
  background: rgba(255,255,255,0.05);
}
.game-item .thumb {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
  background: #111;
  border: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Black Ops One', cursive;
  font-size: 0.85rem;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.9);
}
.game-item .meta { flex: 1; min-width: 0; }
.game-item .meta .num {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--color);
  opacity: 0.8;
}
.game-item .meta .title {
  font-family: 'Black Ops One', cursive;
  font-size: 0.95rem;
  letter-spacing: 0.05em;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.game-item .meta .desc {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.02em;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.now-playing {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color);
  margin-top: 2px;
  font-weight: 700;
}
</style>
</head>

  { num:'87', name:'CRANE',      folder:'game-87-crane',      file:'index.html', color:'#f06292', desc:'Grab prizes with the claw machine' },
  { num:'88', name:'DRIP',       folder:'game-88-drip',       file:'index.html', color:'#29b6f6', desc:'Catch water drops, avoid oil' },
  { num:'89', name:'SWAT',       folder:'game-89-swat',       file:'index.html', color:'#66bb6a', desc:'Whack bugs — spare the bees' },
  { num:'90', name:'PICKPOCKET', folder:'game-90-pickpocket', file:'index.html', color:'#ab47bc', desc:'Steal items without getting caught' },
  { num:'91', name:'FIREFLY',    folder:'game-91-firefly',    file:'index.html', color:'#c6ff00', desc:'Catch glowing fireflies in a jar' },
  { num:'92', name:'GEYSER',     folder:'game-92-geyser',     file:'index.html', color:'#80d8ff', desc:'Jump between erupting geysers' },
  { num:'93', name:'ROOTS',      folder:'game-93-roots',      file:'index.html', color:'#8d6e63', desc:'Grow roots underground to reach water' },
  { num:'94', name:'ICEBREAK',   folder:'game-94-icebreak',   file:'index.html', color:'#e0f7fa', desc:'Crack ice to free trapped fish' },
  { num:'95', name:'BLACKOUT',   folder:'game-95-blackout',   file:'index.html', color:'#b388ff', desc:'Memory match with blackout zones' },
  { num:'96', name:'ABACUS',     folder:'game-96-abacus',     file:'index.html', color:'#ff7043', desc:'Slide beads to match the number' },
  { num:'97', name:'BID',        folder:'game-97-bid',        file:'index.html', color:'#ffd740', desc:'Auction bluffing against AI' },
  { num:'98', name:'ANAGRAM',    folder:'game-98-anagram',    file:'index.html', color:'#448aff', desc:'Unscramble the letters' },
  { num:'99', name:'SEMAPHORE',  folder:'game-99-semaphore',  file:'index.html', color:'#ef5350', desc:'Decode flag signal messages' },
  { num:'100', name:'GAUNTLET',  folder:'game-100-gauntlet',  file:'index.html', color:'#ffd700', desc:'The grand finale — 5 micro-challenges' },
];

const frame    = document.getElementById('game-frame');
const menuBtn  = document.getElementById('menu-btn');
const backdrop = document.getElementById('backdrop');
const panel    = document.getElementById('panel');
const list     = document.getElementById('game-list');
const track    = document.getElementById('carousel-track');

const params = new URLSearchParams(location.search);
let currentSrc = params.get('g') || GAMES[0].folder + '/' + GAMES[0].file;

function srcFor(g) { return g.folder + '/' + g.file; }

function loadGame(src) {
  currentSrc = src;
  frame.src = src;
  const url = new URL(location.href);
  url.searchParams.set('g', src);
  history.replaceState(null, '', url);
  // Track game play in Google Analytics
  const game = GAMES.find(g => srcFor(g) === src);
  if (game) {
    gtag('event', 'play_game', { game_number: game.num, game_name: game.name });
  }
  updateActive(src);
  closeMenu();
  // scroll carousel to active item
  const active = track.querySelector('.c-item.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function updateActive(src) {
  // carousel
  track.querySelectorAll('.c-item').forEach(el =>
    el.classList.toggle('active', el.dataset.src === src)
  );
  // side panel
  list.querySelectorAll('.game-item').forEach(el => {
    el.classList.toggle('active', el.dataset.src === src);
    el.querySelector('.now-playing').style.display =
      el.dataset.src === src ? 'block' : 'none';
  });
}

// Build carousel
GAMES.forEach(g => {
  const src = srcFor(g);
  const item = document.createElement('div');
  item.className = 'c-item' + (src === currentSrc ? ' active' : '');
  item.dataset.src = src;
  item.style.setProperty('--color', g.color);
  item.innerHTML = `
    <div class="c-thumb" style="background:${g.color}18;border-color:${g.color}33;color:${g.color}">${g.num}</div>
    <div class="c-name">${g.name}</div>
  `;
  item.addEventListener('click', () => loadGame(src));
  track.appendChild(item);
});

// Build side panel list
GAMES.forEach(g => {
  const src = srcFor(g);
  const item = document.createElement('div');
  item.className = 'game-item' + (src === currentSrc ? ' active' : '');
  item.dataset.src = src;
  item.style.setProperty('--color', g.color);
  item.innerHTML = `
    <div class="thumb" style="background:${g.color}18;border-color:${g.color}44;color:${g.color};font-family:'Black Ops One',cursive;font-size:0.85rem;display:flex;align-items:center;justify-content:center">${g.num}</div>
    <div class="meta">
      <div class="num">${g.num}</div>
      <div class="title">${g.name}</div>
      <div class="desc">${g.desc}</div>
      <div class="now-playing" style="display:${src === currentSrc ? 'block' : 'none'}">Now playing</div>
    </div>
  `;
  item.addEventListener('click', () => loadGame(src));
  list.appendChild(item);
});

// Load initial game
frame.src = currentSrc;

// Menu toggle
function openMenu() {
  menuBtn.classList.add('open');
  backdrop.classList.add('open');
  panel.classList.add('open');
}
function closeMenu() {
  menuBtn.classList.remove('open');
  backdrop.classList.remove('open');
  panel.classList.remove('open');
}
menuBtn.addEventListener('click', () =>
  panel.classList.contains('open') ? closeMenu() : openMenu()
);
backdrop.addEventListener('click', closeMenu);
document.addEventListener('keydown', e => e.key === 'Escape' && closeMenu());
</script>
</body>
